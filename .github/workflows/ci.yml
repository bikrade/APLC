name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install root dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install client dependencies
        run: npm --prefix client ci --prefer-offline --no-audit

      - name: Install server dependencies
        run: npm --prefix server ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Run unit and end-to-end tests
        run: npm run test

  docker-validate:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Avoid pulling the BuildKit image from Docker Hub (rate-limited/flaky).
          driver: docker

      - name: Validate production Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: aplc-ci:latest
          # With the `docker` driver, the GitHub Actions cache backend is unavailable.

  deploy:
    needs:
      - validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture current active revision
        id: previous
        run: |
          PREVIOUS_REVISION=$(az containerapp revision list -n aplc-app -g aplc-rg --query "[?properties.active].name | [0]" -o tsv)
          echo "revision=$PREVIOUS_REVISION" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/aplc:${{ github.sha }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/aplc:latest

      - name: Update Container App secrets
        run: |
          az containerapp secret set \
            -n aplc-app -g aplc-rg \
            --secrets \
              "openai-key=${{ secrets.OPENAI_API_KEY }}" \
              "google-client-id=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "auth-email=${{ secrets.AUTH_ALLOWED_EMAIL }}" \
              "session-secret=${{ secrets.AUTH_SESSION_SECRET }}"

      - name: Capture current Container App FQDN
        id: app_fqdn
        run: |
          FQDN=$(az containerapp show -n aplc-app -g aplc-rg --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            -n aplc-app -g aplc-rg \
            --image aplcregistry2026.azurecr.io/aplc:${{ github.sha }} \
            --set-env-vars \
              "PORT=3001" \
              "OPENAI_MODEL=gpt-4o-mini" \
              "DATA_ROOT=/app/data" \
              "READING_AI_TIMEOUT_MS=25000" \
              "READING_AI_RETRY_COUNT=2" \
              "READING_AI_RETRY_BASE_DELAY_MS=1200" \
              "READING_AI_RETRY_MAX_DELAY_MS=4000" \
              "OPENAI_API_KEY=secretref:openai-key" \
              "GOOGLE_CLIENT_ID=secretref:google-client-id" \
              "AUTH_ALLOWED_EMAIL=secretref:auth-email" \
              "AUTH_SESSION_SECRET=secretref:session-secret" \
              "AZURE_STORAGE_ACCOUNT=aplcfiles2026" \
              "AZURE_STORAGE_CONTAINER=userdata" \
              "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ secrets.APPINSIGHTS_CONNECTION_STRING }}" \
              "CORS_ALLOWED_ORIGINS=https://${{ steps.app_fqdn.outputs.fqdn }}"

      - name: Verify deployment health
        run: |
          sleep 30
          FQDN=$(az containerapp show -n aplc-app -g aplc-rg --query 'properties.configuration.ingress.fqdn' -o tsv)
          export SMOKE_BASE_URL="https://$FQDN"
          node ./scripts/post-deploy-smoke.mjs
          echo "Deployment healthy at $SMOKE_BASE_URL"

      - name: Roll back failed deployment
        if: failure() && steps.previous.outputs.revision != ''
        run: |
          chmod +x ./scripts/rollback-container-app.sh
          ./scripts/rollback-container-app.sh aplc-app aplc-rg "${{ steps.previous.outputs.revision }}"
